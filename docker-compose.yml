services:
  api:
    build: .
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000
    environment:
      APP_ENV: local
      LOG_LEVEL: info
      DATABASE_URL: postgresql+psycopg://belzakupki:belzakupki@db:5432/belzakupki
      REDIS_URL: redis://redis:6379/0
      GOSZAKUPKI_VERIFY_SSL: "${GOSZAKUPKI_VERIFY_SSL:-false}"
    ports:
      - "${API_PORT:-8008}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: python apps/worker/main.py
    environment:
      APP_ENV: local
      LOG_LEVEL: info
      DATABASE_URL: postgresql+psycopg://belzakupki:belzakupki@db:5432/belzakupki
      REDIS_URL: redis://redis:6379/0
      GOSZAKUPKI_VERIFY_SSL: "${GOSZAKUPKI_VERIFY_SSL:-false}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: belzakupki
      POSTGRES_PASSWORD: belzakupki
      POSTGRES_DB: belzakupki
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U belzakupki -d belzakupki"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -h localhost ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
